<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #bdaa90;
                margin: 0;
                padding: 0;
            }
            .cat-img {
                width: 100%;
                max-width: 800px;
                margin: 0 auto;
                text-align: center;
                color: #ffffff;
                font-size: 80px;
                -webkit-text-stroke: 3px #000000;
                flex: 1;
            }

            /* Prevent text selection */
            .cat-img {
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }

            #p {
                background-image: url('imgs/p.png');
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }

            /* new background div */
            #op {
                background-image: url('imgs/op.png');
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }
            .title{
                width: 100%;
                max-width: 600px;
                margin-top: 2em;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img class="title" src="imgs/popcat.svg" alt="POPCAT CLASSIC" width="400">
            <div class="cat-img" id="p">0</div>
            <div class="cat-img" id="op"></div>
        </div>
    </body>
</html>
